name: CI-CD

on:
  push:
  pull_request:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json
      - name: Install
        run: npm ci
        working-directory: api
      - name: Test
        run: npm test
        working-directory: api
      - name: Lint
        run: npm run lint
        working-directory: api

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        run: docker build -t kitchen-api:local ./api --target production
      - name: Build Web UI image
        run: docker build -t kitchen-web:local ./web-ui

  k8s-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz -o kubeconform.tar.gz
          tar -xzf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/kubeconform
      - name: Validate manifests
        run: |
          kubeconform -summary -strict k8s/namespace.yaml
          kubeconform -summary -strict k8s/db/statefulset.yaml
          kubeconform -summary -strict k8s/api/deployment.yaml
          kubeconform -summary -strict k8s/web-ui/deployment.yaml
          kubeconform -summary -strict k8s/monitoring/prometheus-config.yaml
          kubeconform -summary -strict k8s/monitoring/grafana-dashboard.yaml
          kubeconform -summary -strict k8s/monitoring/grafana-deployment.yaml
